<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitanje ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    color:white;
    margin-bottom:30px;
}

button{
    font-size:22px;
    padding:15px 35px;
    margin:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

#yes{
    background:#4CAF50;
    color:white;
}

#no{
    background:#f44336;
    color:white;
    position:absolute;
}

#message{
    display:none;
    color:white;
    font-size:40px;
    margin-top:30px;
    animation:pop .6s ease;
}

@keyframes pop{
    from{
        transform:scale(.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Hoćeš li se i dalje družiti sa mnom? ❤️</h1>

    <button id="yes">DA ❤️</button>
    <button id="no">NE</button>

    <div id="message">
        🎉 Znao sam da ćeš reći DA! ❤️
    </div>
</div>

<script>
const no=document.getElementById("no");

function moveButton(){
    const x=Math.random()*(window.innerWidth-no.offsetWidth);
    const y=Math.random()*(window.innerHeight-no.offsetHeight);

    no.style.left=x+"px";
    no.style.top=y+"px";
}

moveButton();

no.addEventListener("mouseenter",moveButton);
no.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    moveButton();
});

document.getElementById("yes").addEventListener("click",()=>{

    document.querySelector("h1").style.display="none";
    document.getElementById("yes").style.display="none";
    document.getElementById("no").style.display="none";

    document.getElementById("message").style.display="block";

    for(let i=0;i<250;i++){

        const c=document.createElement("div");
        c.className="confetti";

        c.style.left=Math.random()*100+"vw";
        c.style.background=`hsl(${Math.random()*360},100%,50%)`;
        c.style.animationDuration=(2+Math.random()*3)+"s";
        c.style.transform=`rotate(${Math.random()*360}deg)`;

        document.body.appendChild(c);

        setTimeout(()=>c.remove(),5000);
    }

});
</script>

</body>
</html>
